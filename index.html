<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Wash Booking</title>
<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:25px;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.1)}
h1{text-align:center}
label{display:block;margin-top:12px}
input,select,button{width:100%;padding:10px;margin-top:5px;font-size:15px}
button{background:#000;color:#fff;border:none;cursor:pointer;margin-top:20px}
.price{font-size:20px;font-weight:bold;text-align:center;margin-top:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-top:20px}
.slot{padding:10px;border:1px solid #ddd;border-radius:6px;background:#fafafa;text-align:center;cursor:pointer}
.slot.unavailable{background:#ffd6d6;border-color:#ff8a8a;cursor:not-allowed}
.slot.selected{background:#000;color:#fff}
</style>
</head>
<body>

<div class="container">
<h1>Car Wash Booking</h1>

<label>Name</label>
<input id="name" type="text" placeholder="Customer name">

<label>Email</label>
<input id="email" type="email" placeholder="Customer email">

<label>Car Size</label>
<select id="carSize" onchange="updateUI()">
<option value="">Select</option>
<option value="small">Small</option>
<option value="medium">Medium</option>
<option value="large">Large</option>
</select>

<label>Service</label>
<select id="serviceType" onchange="updateUI()">
<option value="">Select</option>
<option value="outside">Outside Only</option>
<option value="full">Inside & Out</option>
</select>

<div class="price" id="priceDisplay">Price: £0</div>

<h3>Select Time</h3>
<div id="calendar" class="grid"></div>

<button onclick="bookWash()">Book & Pay</button>

</div>

<script>

const STORAGE_KEY = "carwashBookings";
const SHEETS_WEBHOOK = "PASTE_GOOGLE_SCRIPT_URL_HERE";

const prices={
 small:{outside:20,full:30},
 medium:{outside:25,full:35},
 large:{outside:30,full:40}
};

const durations={
 small:{outside:30,full:45},
 medium:{outside:30,full:60},
 large:{outside:45,full:70}
};

const paymentLinks={
 small:{outside:"PASTE_LINK",full:"PASTE_LINK"},
 medium:{outside:"PASTE_LINK",full:"PASTE_LINK"},
 large:{outside:"PASTE_LINK",full:"PASTE_LINK"}
};

let selectedStart=null;

function getBookings(){
 return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
}

function saveBookings(b){
 localStorage.setItem(STORAGE_KEY,JSON.stringify(b));
}

function formatTime(mins){
 const h=Math.floor(mins/60);
 const m=mins%60;
 return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0');
}

function updateUI(){
 updatePrice();
 generateCalendar();
}

function updatePrice(){
 const size=document.getElementById("carSize").value;
 const service=document.getElementById("serviceType").value;

 if(size && service){
  const price=prices[size][service];
  document.getElementById("priceDisplay").innerText="Price: £"+price;
 }
}

function generateCalendar(){

 const calendar=document.getElementById("calendar");
 calendar.innerHTML="";

 const size=document.getElementById("carSize").value;
 const service=document.getElementById("serviceType").value;

 const bookings=getBookings();

 const start=9*60+30;
 const end=16*60;

 let duration=0;

 if(size && service){
  duration=durations[size][service];
 }

 for(let t=start;t<=end;t+=15){

  const slot=document.createElement("div");
  slot.className="slot";
  slot.innerText=formatTime(t);
  slot.dataset.time=t;

  let clash=false;

  if(duration>0){
   const proposedEnd=t+duration;

   if(proposedEnd>end) clash=true;

   for(const b of bookings){
    if(!(proposedEnd<=b.start || t>=b.end)){
     clash=true;
    }
   }
  } else {
   clash=true;
  }

  if(clash){
   slot.classList.add("unavailable");
  }else{

   slot.addEventListener("click",function(){

    document.querySelectorAll(".slot").forEach(s=>s.classList.remove("selected"));

    slot.classList.add("selected");

    selectedStart=parseInt(slot.dataset.time);

   });

  }

  calendar.appendChild(slot);
 }
}

async function sendToSheets(data){

 if(SHEETS_WEBHOOK==="PASTE_GOOGLE_SCRIPT_URL_HERE") return;

 try{

  await fetch(SHEETS_WEBHOOK,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify(data)
  });

 }catch(err){
  console.log(err);
 }

}

function bookWash(){

 const name=document.getElementById("name").value;
 const email=document.getElementById("email").value;
 const size=document.getElementById("carSize").value;
 const service=document.getElementById("serviceType").value;

 if(!name||!email||!size||!service||selectedStart===null){
  alert("Please complete all fields and select a time.");
  return;
 }

 const duration=durations[size][service];
 const end=selectedStart+duration;

 const bookings=getBookings();

 bookings.push({start:selectedStart,end:end});

 saveBookings(bookings);

 const bookingData={
  name:name,
  email:email,
  size:size,
  service:service,
  start:formatTime(selectedStart),
  end:formatTime(end),
  price:prices[size][service]
 };

 sendToSheets(bookingData);

 const link=paymentLinks[size][service];

 if(link==="PASTE_LINK"){
  alert("Add your payment link first");
  return;
 }

 window.location.href=link;

}

generateCalendar();

</script>

</body>
</html>
